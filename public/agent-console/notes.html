<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Notes — ClientVia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/agent-console/notes.css">
</head>
<body>

  <!-- ======================================================================
       HEADER
       ====================================================================== -->
  <header class="notes-header">
    <div class="notes-header-left">
      <a href="#" id="back-link" class="notes-back-link">← Agent Console</a>
      <div class="notes-header-divider"></div>
      <svg class="notes-logo-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="1" width="12" height="14" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M5 5H11M5 8H11M5 11H8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="notes-header-title">Developer Notes</span>
      <span class="notes-company-pill" id="notes-company-id">—</span>
    </div>
    <div class="notes-header-center">
      <span class="notes-save-status" id="save-status">All changes saved</span>
    </div>
    <div class="notes-header-right">
      <button class="notes-btn notes-btn-ghost" id="btn-search" title="Search notes (Ctrl+F)">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M10 10L13 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Search
      </button>
      <button class="notes-btn notes-btn-ghost" id="btn-export" title="Export notes as JSON">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 9.5V2M7.5 9.5L5 7M7.5 9.5L10 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 12.5H13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Export
      </button>
      <button class="notes-btn notes-btn-ghost" id="btn-import" title="Import notes from JSON">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 2V9.5M7.5 2L5 4.5M7.5 2L10 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 12.5H13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Import
      </button>
    </div>
  </header>

  <!-- ======================================================================
       SEARCH OVERLAY
       ====================================================================== -->
  <div class="search-overlay" id="search-overlay" style="display:none;">
    <div class="search-panel">
      <div class="search-input-row">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="#6B7280" stroke-width="1.5"/><path d="M11 11L14 14" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search across all tabs and sections...">
        <button class="search-close" id="search-close">✕</button>
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <!-- ======================================================================
       WORKSPACE — SIDEBAR + EDITOR
       ====================================================================== -->
  <div class="notes-workspace">

    <!-- ── LEFT SIDEBAR — TABS ─────────────────────────────────────────── -->
    <aside class="notes-sidebar">
      <div class="sidebar-header">
        <span class="sidebar-label">NOTEBOOKS</span>
        <button class="sidebar-add-btn" id="btn-add-tab" title="New notebook">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2V12M2 7H12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="tab-list" id="tab-list">
        <!-- Tabs rendered by JS -->
      </div>

      <div class="sidebar-footer">
        <span class="sidebar-tab-count" id="sidebar-tab-count">0 notebooks</span>
      </div>
    </aside>

    <!-- ── MAIN EDITOR AREA ────────────────────────────────────────────── -->
    <main class="notes-editor">

      <!-- Empty state when no tabs -->
      <div class="editor-empty-state" id="editor-empty-state">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="4" width="32" height="40" rx="3" stroke="#D1D5DB" stroke-width="2"/>
          <path d="M16 16H32M16 24H32M16 32H24" stroke="#D1D5DB" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p class="empty-title">No notebooks yet</p>
        <p class="empty-sub">Create your first notebook to start capturing build notes</p>
        <button class="notes-btn notes-btn-primary" id="btn-add-first-tab">+ New Notebook</button>
      </div>

      <!-- Tab editor (visible when a tab is active) -->
      <div class="tab-editor" id="tab-editor" style="display:none;">

        <!-- Tab Title Bar -->
        <div class="tab-title-bar">
          <div class="tab-color-dot" id="tab-color-dot"></div>
          <input type="text" id="tab-title-input" class="tab-title-input" placeholder="Notebook title..." maxlength="80">
          <div class="tab-title-actions">
            <button class="tab-meta-btn" id="btn-tab-color" title="Change color">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3"/><circle cx="7" cy="7" r="2.5" fill="currentColor"/></svg>
            </button>
            <span class="tab-section-count" id="tab-section-count">0 sections</span>
            <button class="tab-meta-btn tab-delete-btn" id="btn-delete-tab" title="Delete this notebook">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 3.5H12M5.5 3.5V2H8.5V3.5M5 5.5V11M7 5.5V11M9 5.5V11M3.5 3.5L4 11.5C4 12.0523 4.44772 12.5 5 12.5H9C9.55228 12.5 10 12.0523 10 11.5L10.5 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>

        <!-- Color Picker Dropdown -->
        <div class="color-picker-dropdown" id="color-picker-dropdown" style="display:none;">
          <div class="color-options" id="color-options"></div>
        </div>

        <!-- Sections Container -->
        <div class="sections-container" id="sections-container">
          <!-- Sections rendered by JS -->
        </div>

        <!-- Add Section Button -->
        <div class="add-section-row">
          <button class="add-section-btn" id="btn-add-section">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2V12M2 7H12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            Add Section
          </button>
        </div>

      </div>
    </main>
  </div>

  <!-- Hidden file input for import -->
  <input type="file" id="import-file-input" accept=".json" style="display:none;">

  <script src="/agent-console/lib/auth.js"></script>
  <script src="/agent-console/notes.js"></script>
</body>
</html>
