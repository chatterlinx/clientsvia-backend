<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KC Gaps & Todo</title>
<script src="/agent-console/lib/auth.js"></script>
<style>
  :root {
    --color-primary:  #0ea5e9;
    --bg-page:        #f1f5f9;
    --bg-card:        #ffffff;
    --text-main:      #111827;
    --text-muted:     #6b7280;
    --border:         #e5e7eb;
    --radius:         14px;
    --shadow:         0 1px 4px rgba(0,0,0,.07);
    --red:            #dc2626;
    --amber:          #d97706;
    --green:          #16a34a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background: var(--bg-page); color: var(--text-main); min-height: 100vh; }

  /* ── Header ──────────────────────────────────────────────────────────────── */
  .page-header {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 12px;
    height: 60px; padding: 0 32px; background: #fff;
    border-bottom: 1px solid var(--border); box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .btn-back {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: var(--text-muted);
    text-decoration: none; padding: 6px 10px; border-radius: 8px;
    border: 1px solid var(--border); background: #fff; transition: all .15s; cursor: pointer;
  }
  .btn-back:hover { background: #f9fafb; color: var(--text-main); }
  .header-divider { width: 1px; height: 28px; background: var(--border); }
  .header-title   { font-size: 16px; font-weight: 700; color: var(--text-main); }
  .header-sub     { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .header-spacer  { flex: 1; }
  .btn-refresh {
    display: flex; align-items: center; gap: 7px;
    padding: 9px 18px; border-radius: 9px;
    background: var(--color-primary); color: #fff;
    font-size: 13px; font-weight: 600; border: none;
    cursor: pointer; transition: background .15s; white-space: nowrap;
  }
  .btn-refresh:hover    { background: #0284c7; }
  .btn-refresh:disabled { opacity: .55; cursor: not-allowed; }
  .btn-download {
    display: flex; align-items: center; gap: 7px;
    padding: 9px 14px; border-radius: 9px;
    background: #fff; color: var(--text-main);
    font-size: 13px; font-weight: 600; border: 1px solid var(--border);
    cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .btn-download:hover { background: #f1f5f9; border-color: #94a3b8; }

  /* ── Layout ──────────────────────────────────────────────────────────────── */
  .page-body { max-width: 1200px; margin: 0 auto; padding: 28px 32px 80px; }

  /* ── Loading / Empty ─────────────────────────────────────────────────────── */
  .state-loading { text-align: center; padding: 80px 40px; color: var(--text-muted); font-size: 14px; }
  .state-empty {
    text-align: center; padding: 80px 40px;
    color: var(--text-muted); font-size: 14px; line-height: 1.7;
  }
  .state-empty .icon { font-size: 48px; display: block; margin-bottom: 16px; }
  .state-empty h2    { font-size: 18px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }

  /* ── Stat Cards ──────────────────────────────────────────────────────────── */
  .stat-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px; box-shadow: var(--shadow);
  }
  .stat-label { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 4px; }
  .stat-value { font-size: 28px; font-weight: 800; color: var(--text-main); }
  .stat-card.gap    .stat-value { color: var(--red); }
  .stat-card.fb     .stat-value { color: var(--amber); }
  .stat-card.ack    .stat-value { color: var(--text-muted); }

  /* ── Filter Bar ──────────────────────────────────────────────────────────── */
  .filter-bar { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-group { display: flex; gap: 4px; align-items: center; }
  .filter-label { font-size: 11.5px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-right: 6px; }
  .filter-btn {
    padding: 5px 12px; border-radius: 7px; font-size: 12.5px; font-weight: 500;
    border: 1px solid var(--border); background: #fff; color: var(--text-main);
    cursor: pointer; transition: all .15s;
  }
  .filter-btn:hover { border-color: #94a3b8; }
  .filter-btn.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
  .filter-divider { width: 1px; height: 22px; background: var(--border); }

  /* ── Table ───────────────────────────────────────────────────────────────── */
  .table-wrap {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
  }
  .gap-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .gap-table thead { background: #f8fafc; }
  .gap-table th {
    padding: 10px 16px; text-align: left; font-size: 10.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }
  .gap-table td {
    padding: 12px 16px; border-bottom: 1px solid #f1f5f9; vertical-align: top;
  }
  .gap-table tbody tr.data-row { cursor: pointer; transition: background .1s; }
  .gap-table tbody tr.data-row:hover { background: #f8fafc; }

  /* Phrase column */
  .phrase-cell { max-width: 300px; word-break: break-word; color: #0369a1; font-weight: 500; }
  .response-cell { max-width: 220px; word-break: break-word; color: var(--text-muted); font-size: 12px; }

  /* Type badges */
  .type-badge {
    display: inline-block; padding: 3px 8px; border-radius: 5px;
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; white-space: nowrap;
  }
  .type-badge.gap { background: #fee2e2; color: #b91c1c; }
  .type-badge.fb  { background: #fef3c7; color: #92400e; }
  .type-badge.ack { background: #f1f5f9; color: #475569; }

  /* Action buttons */
  .btn-act {
    padding: 4px 10px; border-radius: 6px; font-size: 11.5px; font-weight: 600;
    border: 1px solid var(--border); background: #fff; color: var(--text-muted);
    cursor: pointer; transition: all .12s; white-space: nowrap;
  }
  .btn-act:hover { border-color: #94a3b8; color: var(--text-main); }
  .btn-act.primary { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
  .btn-act.primary:hover { background: #0284c7; }
  .actions-cell { display: flex; gap: 6px; }

  /* Expandable detail row */
  .detail-row { display: none; }
  .detail-row.open { display: table-row; }
  .detail-cell {
    padding: 16px 20px; background: #f8fafc; border-bottom: 2px solid var(--border);
  }
  .detail-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .detail-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 2px; }
  .detail-value { font-size: 13px; color: var(--text-main); word-break: break-all; }
  .detail-value a { color: var(--color-primary); text-decoration: none; font-weight: 600; }
  .detail-value a:hover { text-decoration: underline; }
  .detail-answer { margin-top: 12px; }
  .detail-answer-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 4px; }
  .detail-answer-text { font-size: 13px; line-height: 1.6; color: var(--text-main); background: #fff; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); }

  /* ── Recommendations Panel ──────────────────────────────────────────────── */
  .rec-panel {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); margin-bottom: 24px; overflow: hidden;
  }
  .rec-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; cursor: pointer; user-select: none;
    background: linear-gradient(135deg, #fefce8, #fef3c7);
  }
  .rec-header-left { display: flex; align-items: center; gap: 10px; }
  .rec-icon { font-size: 18px; }
  .rec-title { font-size: 14px; font-weight: 700; color: var(--text-main); }
  .rec-count {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 22px; height: 22px; padding: 0 6px; border-radius: 11px;
    background: var(--amber); color: #fff; font-size: 11px; font-weight: 700;
  }
  .rec-toggle { font-size: 12px; color: var(--text-muted); transition: transform .2s; }
  .rec-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
  .rec-body.collapsed { display: none; }

  .rec-card {
    padding: 14px 18px; border-radius: 10px; border-left: 4px solid;
  }
  .rec-card.high   { border-left-color: var(--red); background: #fef2f2; }
  .rec-card.medium { border-left-color: var(--amber); background: #fffbeb; }
  .rec-card.low    { border-left-color: #94a3b8; background: #f8fafc; }

  .rec-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .rec-priority {
    font-size: 10.5px; font-weight: 800; letter-spacing: .04em; white-space: nowrap;
  }
  .rec-priority.high   { color: #b91c1c; }
  .rec-priority.medium { color: #92400e; }
  .rec-priority.low    { color: #64748b; }
  .rec-card-title { font-size: 13px; font-weight: 700; color: var(--text-main); }
  .rec-card-desc { font-size: 12.5px; color: var(--text-muted); line-height: 1.5; margin-bottom: 8px; }

  .rec-phrases { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .rec-phrase {
    display: inline-block; padding: 3px 8px; border-radius: 5px;
    font-size: 11.5px; color: #0369a1; background: #e0f2fe; font-style: italic;
    max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .rec-phrase-more {
    display: inline-block; padding: 3px 8px; border-radius: 5px;
    font-size: 11.5px; color: var(--text-muted); background: #f1f5f9;
  }
  .rec-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .rec-actions a.btn-act { text-decoration: none; display: inline-flex; align-items: center; }

  /* ── Per-row suggestion ─────────────────────────────────────────────────── */
  .detail-suggestion {
    display: flex; align-items: flex-start; gap: 8px; margin-top: 12px;
    padding: 10px 14px; border-radius: 8px;
    background: #eff6ff; border: 1px solid #bfdbfe;
  }
  .suggestion-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .suggestion-text { font-size: 12.5px; color: #1e40af; line-height: 1.5; }
  .suggestion-text strong { font-weight: 700; }
  .suggestion-repeat { color: var(--red); font-weight: 600; }

  /* ── Occurrence badge ───────────────────────────────────────────────────── */
  .occ-badge {
    display: inline-block; margin-left: 6px; padding: 1px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 700; background: #fecaca; color: #b91c1c; vertical-align: middle;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #0f172a; color: #fff; padding: 10px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 500; z-index: 9999; opacity: 0; transition: opacity .3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* Responsive */
  @media (max-width: 768px) {
    .stat-row { grid-template-columns: repeat(2, 1fr); }
    .detail-grid { grid-template-columns: repeat(2, 1fr); }
    .page-body { padding: 16px; }
  }

  /* Print / PDF */
  @media print {
    body { background: #fff; }
    .page-header { position: static; box-shadow: none; border-bottom: 2px solid #000; }
    .btn-refresh, .btn-download, .btn-back, .header-divider, .filter-bar, .actions-cell, .toast, .rec-actions { display: none !important; }
    .rec-panel { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
    .rec-header { background: #f8f8f0; }
    .rec-body.collapsed { display: flex !important; }
    .page-body { padding: 16px 0; max-width: 100%; }
    .gap-table th:last-child, .gap-table td:last-child { display: none; }
    .table-wrap { box-shadow: none; border: 1px solid #ccc; }
    .detail-row.open { display: table-row; }
    .stat-card { border: 1px solid #ccc; box-shadow: none; }
  }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header class="page-header">
  <a class="btn-back" id="btnBack" href="#">&larr; Knowledge Base</a>
  <div class="header-divider"></div>
  <div>
    <div class="header-title">KC Gaps & Todo</div>
    <div class="header-sub">Call gap audit — see what KC couldn't answer</div>
  </div>
  <div class="header-spacer"></div>
  <button class="btn-download" onclick="downloadJSON()" title="Download as JSON">JSON</button>
  <button class="btn-download" onclick="downloadPDF()" title="Print / Save as PDF">PDF</button>
  <button class="btn-refresh" id="btnRefresh" onclick="loadGaps()">Refresh</button>
</header>

<!-- ── Body ────────────────────────────────────────────────────────────────── -->
<div class="page-body">
  <div id="pageLoading" class="state-loading">Loading gap data...</div>
  <div id="pageContent" style="display:none;">
    <div id="statCards"></div>
    <div id="recommendations"></div>
    <div id="filterBar"></div>
    <div id="gapTable"></div>
  </div>
</div>

<!-- ── Toast ───────────────────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script src="/agent-console/todo.js"></script>
</body>
</html>
