<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KC Gaps & Todo</title>
<script src="/agent-console/lib/auth.js"></script>
<style>
  :root {
    --color-primary:  #0ea5e9;
    --bg-page:        #f1f5f9;
    --bg-card:        #ffffff;
    --text-main:      #111827;
    --text-muted:     #6b7280;
    --border:         #e5e7eb;
    --radius:         14px;
    --shadow:         0 1px 4px rgba(0,0,0,.07);
    --red:            #dc2626;
    --amber:          #d97706;
    --green:          #16a34a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background: var(--bg-page); color: var(--text-main); min-height: 100vh; }

  /* ── Header ──────────────────────────────────────────────────────────────── */
  .page-header {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 12px;
    height: 60px; padding: 0 32px; background: #fff;
    border-bottom: 1px solid var(--border); box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .btn-back {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: var(--text-muted);
    text-decoration: none; padding: 6px 10px; border-radius: 8px;
    border: 1px solid var(--border); background: #fff; transition: all .15s; cursor: pointer;
  }
  .btn-back:hover { background: #f9fafb; color: var(--text-main); }
  .header-divider { width: 1px; height: 28px; background: var(--border); }
  .header-title   { font-size: 16px; font-weight: 700; color: var(--text-main); }
  .header-sub     { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .header-spacer  { flex: 1; }
  .btn-refresh {
    display: flex; align-items: center; gap: 7px;
    padding: 9px 18px; border-radius: 9px;
    background: var(--color-primary); color: #fff;
    font-size: 13px; font-weight: 600; border: none;
    cursor: pointer; transition: background .15s; white-space: nowrap;
  }
  .btn-refresh:hover    { background: #0284c7; }
  .btn-refresh:disabled { opacity: .55; cursor: not-allowed; }
  .btn-download {
    display: flex; align-items: center; gap: 7px;
    padding: 9px 14px; border-radius: 9px;
    background: #fff; color: var(--text-main);
    font-size: 13px; font-weight: 600; border: 1px solid var(--border);
    cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .btn-download:hover { background: #f1f5f9; border-color: #94a3b8; }

  /* ── Layout ──────────────────────────────────────────────────────────────── */
  .page-body { max-width: 1200px; margin: 0 auto; padding: 28px 32px 80px; }

  /* ── Loading / Empty ─────────────────────────────────────────────────────── */
  .state-loading { text-align: center; padding: 80px 40px; color: var(--text-muted); font-size: 14px; }
  .state-empty {
    text-align: center; padding: 80px 40px;
    color: var(--text-muted); font-size: 14px; line-height: 1.7;
  }
  .state-empty .icon { font-size: 48px; display: block; margin-bottom: 16px; }
  .state-empty h2    { font-size: 18px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }

  /* ── Stat Cards ──────────────────────────────────────────────────────────── */
  .stat-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px; box-shadow: var(--shadow);
  }
  .stat-label { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 4px; }
  .stat-value { font-size: 26px; font-weight: 800; color: var(--text-main); }
  .stat-sub   { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .stat-card.gap    .stat-value { color: var(--red); }
  .stat-card.fb     .stat-value { color: var(--red); }
  .stat-card.ack    .stat-value { color: var(--text-muted); }
  .stat-card.uap-hit         .stat-value { color: var(--green); }
  .stat-card.uap-miss-key    .stat-value { color: var(--amber); }
  .stat-card.hit-rate-green  .stat-value { color: var(--green); }
  .stat-card.hit-rate-amber  .stat-value { color: var(--amber); }
  .stat-card.hit-rate-red    .stat-value { color: var(--red); }
  .stat-card.hit-rate-neutral .stat-value { color: var(--text-muted); }

  /* ── UAP Health Card ─────────────────────────────────────────────────────── */
  .uap-health {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px 22px; margin-bottom: 20px;
  }
  .uap-health-header {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .uap-health-title {
    font-size: 14px; font-weight: 700; color: var(--text-main);
    display: flex; align-items: center; gap: 8px;
  }
  .uap-health-pill {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 700; letter-spacing: .02em;
  }
  .uap-health-pill.green { background: #dcfce7; color: #166534; }
  .uap-health-pill.amber { background: #fef3c7; color: #92400e; }
  .uap-health-pill.red   { background: #fee2e2; color: #b91c1c; }
  .uap-health-caret { color: var(--text-muted); font-size: 13px; transition: transform .15s; }
  .uap-health.collapsed .uap-health-body { display: none; }
  .uap-health.collapsed .uap-health-caret { transform: rotate(-90deg); }
  .uap-health-body { margin-top: 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .uap-health-body > .breakdown { grid-column: 1 / -1; }
  @media (max-width: 820px) { .uap-health-body { grid-template-columns: 1fr; } }
  .gate-breakdown-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: 12.5px; }
  .gate-breakdown-row .gate-label { width: 150px; color: var(--text-muted); font-weight: 600; }
  .gate-breakdown-row .gate-bar-wrap { flex: 1; height: 12px; background: #f1f5f9; border-radius: 6px; overflow: hidden; }
  .gate-breakdown-row .gate-bar { height: 100%; border-radius: 6px; }
  .gate-breakdown-row .gate-bar.green { background: #16a34a; }
  .gate-breakdown-row .gate-bar.amber { background: #d97706; }
  .gate-breakdown-row .gate-bar.orange { background: #ea580c; }
  .gate-breakdown-row .gate-bar.red { background: #dc2626; }
  .gate-breakdown-row .gate-bar.gray { background: #9ca3af; }
  .gate-breakdown-row .gate-num { width: 70px; text-align: right; color: var(--text-main); font-variant-numeric: tabular-nums; font-size: 12px; }
  .top-list h4 { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--text-muted); margin-bottom: 8px; }
  .top-list table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .top-list td { padding: 4px 0; border-bottom: 1px solid #f1f5f9; }
  .top-list td.cnt { text-align: right; font-variant-numeric: tabular-nums; color: var(--text-muted); width: 40px; }
  .top-list tr.clickable { cursor: pointer; }
  .top-list tr.clickable:hover td { color: var(--color-primary); }

  /* ── Filter Bar ──────────────────────────────────────────────────────────── */
  .filter-bar { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-group { display: flex; gap: 4px; align-items: center; }
  .filter-label { font-size: 11.5px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-right: 6px; }
  .filter-btn {
    padding: 5px 12px; border-radius: 7px; font-size: 12.5px; font-weight: 500;
    border: 1px solid var(--border); background: #fff; color: var(--text-main);
    cursor: pointer; transition: all .15s;
  }
  .filter-btn:hover { border-color: #94a3b8; }
  .filter-btn.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
  .filter-divider { width: 1px; height: 22px; background: var(--border); }

  /* ── Table ───────────────────────────────────────────────────────────────── */
  .table-wrap {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
  }
  .gap-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .gap-table thead { background: #f8fafc; }
  .gap-table th {
    padding: 10px 16px; text-align: left; font-size: 10.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }
  .gap-table td {
    padding: 12px 16px; border-bottom: 1px solid #f1f5f9; vertical-align: top;
  }
  .gap-table tbody tr.data-row { cursor: pointer; transition: background .1s; }
  .gap-table tbody tr.data-row:hover { background: #f8fafc; }

  /* Phrase column */
  .phrase-cell { max-width: 300px; word-break: break-word; color: #0369a1; font-weight: 500; }
  .response-cell { max-width: 220px; word-break: break-word; color: var(--text-muted); font-size: 12px; }

  /* Type badges */
  .type-badge {
    display: inline-block; padding: 3px 8px; border-radius: 5px;
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; white-space: nowrap;
  }
  .type-badge.gap { background: #fee2e2; color: #b91c1c; }    /* Section Gap — orange-red */
  .type-badge.fb  { background: #fee2e2; color: #b91c1c; }    /* UAP Miss → Groq — red */
  .type-badge.ack { background: #f1f5f9; color: #475569; }    /* Graceful Ack — gray */
  .type-badge.keysave { background: #fef3c7; color: #92400e; } /* UAP Miss → Keyword Save — amber */
  .type-badge.uaphit  { background: #dcfce7; color: #166534; } /* UAP Hit — green */
  .type-badge.rescued { background: #e0f2fe; color: #075985; } /* Section Gap Rescued — sky */
  .type-badge.nkblock { background: #ede9fe; color: #5b21b6; } /* Negative Keyword Block — violet */

  /* Action buttons */
  .btn-act {
    padding: 4px 10px; border-radius: 6px; font-size: 11.5px; font-weight: 600;
    border: 1px solid var(--border); background: #fff; color: var(--text-muted);
    cursor: pointer; transition: all .12s; white-space: nowrap;
  }
  .btn-act:hover { border-color: #94a3b8; color: var(--text-main); }
  .btn-act.primary { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
  .btn-act.primary:hover { background: #0284c7; }
  .actions-cell { display: flex; gap: 6px; }

  /* Expandable detail row */
  .detail-row { display: none; }
  .detail-row.open { display: table-row; }
  .detail-cell {
    padding: 16px 20px; background: #f8fafc; border-bottom: 2px solid var(--border);
  }
  .detail-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .detail-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 2px; }
  .detail-value { font-size: 13px; color: var(--text-main); word-break: break-all; }
  .detail-value a { color: var(--color-primary); text-decoration: none; font-weight: 600; }
  .detail-value a:hover { text-decoration: underline; }
  .detail-answer { margin-top: 12px; }
  .detail-answer-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 4px; }
  .detail-answer-text { font-size: 13px; line-height: 1.6; color: var(--text-main); background: #fff; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); }

  /* ── Recommendations Panel ──────────────────────────────────────────────── */
  .rec-panel {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); margin-bottom: 24px; overflow: hidden;
  }
  .rec-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; cursor: pointer; user-select: none;
    background: linear-gradient(135deg, #fefce8, #fef3c7);
  }
  .rec-header-left { display: flex; align-items: center; gap: 10px; }
  .rec-icon { font-size: 18px; }
  .rec-title { font-size: 14px; font-weight: 700; color: var(--text-main); }
  .rec-count {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 22px; height: 22px; padding: 0 6px; border-radius: 11px;
    background: var(--amber); color: #fff; font-size: 11px; font-weight: 700;
  }
  .rec-toggle { font-size: 12px; color: var(--text-muted); transition: transform .2s; }
  .rec-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
  .rec-body.collapsed { display: none; }

  .rec-card {
    padding: 14px 18px; border-radius: 10px; border-left: 4px solid;
  }
  .rec-card.high   { border-left-color: var(--red); background: #fef2f2; }
  .rec-card.medium { border-left-color: var(--amber); background: #fffbeb; }
  .rec-card.low    { border-left-color: #94a3b8; background: #f8fafc; }

  .rec-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .rec-priority {
    font-size: 10.5px; font-weight: 800; letter-spacing: .04em; white-space: nowrap;
  }
  .rec-priority.high   { color: #b91c1c; }
  .rec-priority.medium { color: #92400e; }
  .rec-priority.low    { color: #64748b; }
  .rec-card-title { font-size: 13px; font-weight: 700; color: var(--text-main); }
  .rec-card-desc { font-size: 12.5px; color: var(--text-muted); line-height: 1.5; margin-bottom: 8px; }

  .rec-phrases { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .rec-phrase {
    display: inline-block; padding: 3px 8px; border-radius: 5px;
    font-size: 11.5px; color: #0369a1; background: #e0f2fe; font-style: italic;
    max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .rec-phrase-more {
    display: inline-block; padding: 3px 8px; border-radius: 5px;
    font-size: 11.5px; color: var(--text-muted); background: #f1f5f9;
  }
  .rec-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .rec-actions a.btn-act { text-decoration: none; display: inline-flex; align-items: center; }

  /* ── Per-row suggestion ─────────────────────────────────────────────────── */
  .detail-suggestion {
    display: flex; align-items: flex-start; gap: 8px; margin-top: 12px;
    padding: 10px 14px; border-radius: 8px;
    background: #eff6ff; border: 1px solid #bfdbfe;
  }
  .suggestion-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .suggestion-text { font-size: 12.5px; color: #1e40af; line-height: 1.5; }
  .suggestion-text strong { font-weight: 700; }
  .suggestion-repeat { color: var(--red); font-weight: 600; }

  /* ── Occurrence badge ───────────────────────────────────────────────────── */
  .occ-badge {
    display: inline-block; margin-left: 6px; padding: 1px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 700; background: #fecaca; color: #b91c1c; vertical-align: middle;
  }

  /* ── Phrase repeat chip (×N calls) ───────────────────────────────────────
     Shown next to a caller phrase when the same gapKey was heard across
     multiple calls. Click parent row to expand and see each call's details. */
  .repeat-chip {
    display: inline-block; margin-left: 8px; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 700; background: #fef3c7; color: #92400e;
    vertical-align: middle; white-space: nowrap; cursor: help;
    border: 1px solid #fde68a;
  }

  /* ── Phrase Anatomy card ─────────────────────────────────────────────────
     Word-level diagnostic shown at the top of the Verify detail panel.
     Shows: caller phrase with anchor tokens bolded red, 8 cue-field boxes,
     and close-but-no-cigar competitors. */
  .phrase-anatomy {
    background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
    padding: 12px 14px; margin: 10px 0 14px;
  }
  .anatomy-phrase-line {
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
  }
  .anatomy-tag {
    font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
    text-transform: uppercase; color: #64748b;
    background: #f1f5f9; padding: 2px 8px; border-radius: 4px; white-space: nowrap;
  }
  .anatomy-phrase-text {
    font-size: 16px; line-height: 1.5; color: #0f172a; font-weight: 500;
    word-break: break-word;
  }
  /* Anchor word: BOLD RED — the load-bearing word that drove routing. */
  .anchor-hl {
    color: #dc2626; font-weight: 800; background: #fef2f2;
    padding: 0 3px; border-radius: 3px;
    border-bottom: 2px solid #dc2626;
  }
  .anatomy-anchor-legend {
    margin-top: 6px; font-size: 11px; color: #475569;
    display: flex; flex-wrap: wrap; gap: 4px 14px;
  }
  .anatomy-anchor-legend code {
    background: #f8fafc; border: 1px solid #e2e8f0;
    padding: 1px 5px; border-radius: 3px; font-size: 10px; color: #334155;
  }

  /* 8-cue grid — 4 across on desktop, 2 across on mobile */
  .anatomy-cue-grid {
    display: grid; grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 6px; margin-top: 12px;
  }
  @media (max-width: 720px) {
    .anatomy-cue-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  .cue-slot {
    border-radius: 6px; padding: 6px 8px; font-size: 11.5px;
    min-height: 42px; display: flex; flex-direction: column; justify-content: center;
  }
  .cue-slot.filled { background: #ecfdf5; border: 1px solid #6ee7b7; }
  .cue-slot.empty  { background: #f8fafc; border: 1px dashed #cbd5e1; }
  .cue-slot-label {
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; color: #475569; margin-bottom: 2px;
  }
  .cue-slot.filled .cue-slot-label { color: #047857; }
  .cue-slot-value {
    font-weight: 600; color: #0f172a; font-size: 12px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .cue-slot-value.cue-empty {
    font-weight: 400; color: #94a3b8; font-size: 10.5px; font-style: italic;
  }

  /* Competitors — close but no cigar */
  .anatomy-competitors {
    margin-top: 12px; padding-top: 10px; border-top: 1px dashed #e2e8f0;
  }
  .anatomy-competitors-title {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.4px;
    text-transform: uppercase; color: #64748b; margin-bottom: 6px;
  }
  .anatomy-competitors-list { display: flex; flex-direction: column; gap: 4px; }
  .competitor-row {
    display: flex; align-items: center; gap: 10px; font-size: 12px;
    color: #334155; flex-wrap: wrap;
  }
  .competitor-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
    text-transform: uppercase; color: #475569;
    background: #f1f5f9; padding: 2px 6px; border-radius: 4px;
    min-width: 110px; text-align: center;
  }
  .competitor-detail { flex: 1; color: #0f172a; font-weight: 500; }
  .competitor-score {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; font-weight: 700; color: #1e40af;
    background: #dbeafe; padding: 1px 6px; border-radius: 3px;
  }
  .competitor-note { font-size: 10.5px; color: #64748b; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #0f172a; color: #fff; padding: 10px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 500; z-index: 9999; opacity: 0; transition: opacity .3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* ── Verify workflow (closed-loop gap clearing) ───────────────────────── */
  /* Result badges shown after 🧪 Verify runs */
  .verify-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 6px; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .03em; white-space: nowrap;
  }
  .verify-badge.resolved { background: #d1fae5; color: #065f46; }
  .verify-badge.weak     { background: #fef3c7; color: #92400e; }
  .verify-badge.failing  { background: #fee2e2; color: #991b1b; }
  .verify-badge.verifying { background: #e0f2fe; color: #0369a1; }
  .verify-badge .vb-icon { font-size: 12px; line-height: 1; }

  /* Persisted resolution pill (shown instead of Verify button once resolved) */
  .resolution-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 6px; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .03em; white-space: nowrap;
    background: #dcfce7; color: #166534;
  }
  .resolution-pill.WEAK      { background: #fef3c7; color: #92400e; }
  .resolution-pill.REGRESSED { background: #fecaca; color: #991b1b; }
  .resolution-pill.DISMISSED { background: #e5e7eb; color: #475569; }

  /* Row styling for resolved rows (when hide-toggle OFF) */
  .gap-table tbody tr.data-row.is-resolved        { background: #f0fdf4; }
  .gap-table tbody tr.data-row.is-resolved:hover  { background: #dcfce7; }
  .gap-table tbody tr.data-row.is-resolved td     { opacity: .75; }

  /* Button variants for the verify workflow */
  .btn-act.success {
    background: var(--green); color: #fff; border-color: var(--green);
  }
  .btn-act.success:hover { background: #15803d; }
  .btn-act.warn {
    background: #fff; color: var(--amber); border-color: var(--amber);
  }
  .btn-act.warn:hover { background: #fef3c7; }
  .btn-act.danger {
    background: #fff; color: var(--red); border-color: var(--red);
  }
  .btn-act.danger:hover { background: #fee2e2; }

  /* Verify detail box — shows which gates fired */
  .verify-detail {
    margin-top: 12px; padding: 12px 14px;
    border-radius: 8px; border: 1px solid #bfdbfe; background: #eff6ff;
  }
  .verify-detail.resolved { border-color: #86efac; background: #f0fdf4; }
  .verify-detail.weak     { border-color: #fcd34d; background: #fffbeb; }
  .verify-detail.failing  { border-color: #fca5a5; background: #fef2f2; }
  .verify-detail-title {
    font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em;
    margin-bottom: 8px;
  }
  .verify-gate-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 18px;
    font-size: 12px;
  }
  .verify-gate-label { color: var(--text-muted); font-weight: 600; }
  .verify-gate-value { color: var(--text-main); }

  /* ── Tabs (Runtime Gaps / Config Health) ─────────────────────────────── */
  .tab-strip {
    display: flex; gap: 4px; border-bottom: 2px solid var(--border);
    margin-bottom: 20px; padding: 0 2px;
  }
  .tab-btn {
    padding: 10px 18px; border: none; background: transparent;
    font-size: 13.5px; font-weight: 600; color: var(--text-muted);
    cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px;
    transition: color .15s, border-color .15s;
    display: flex; align-items: center; gap: 7px;
  }
  .tab-btn:hover { color: var(--text-main); }
  .tab-btn.active {
    color: var(--color-primary); border-bottom-color: var(--color-primary);
  }
  .tab-btn .tab-count {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 20px; height: 20px; padding: 0 6px; border-radius: 10px;
    font-size: 11px; font-weight: 700; background: #e5e7eb; color: var(--text-muted);
  }
  .tab-btn.active .tab-count { background: #dbeafe; color: var(--color-primary); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Config Health severity pills + coverage bars ────────────────────── */
  .sev-row {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
    margin-bottom: 20px;
  }
  .sev-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px; box-shadow: var(--shadow); text-align: center;
  }
  .sev-card .stat-label { margin-bottom: 6px; }
  .sev-card .stat-value { font-size: 26px; }
  .sev-card.critical .stat-value { color: #7f1d1d; }
  .sev-card.high     .stat-value { color: var(--red); }
  .sev-card.med      .stat-value { color: var(--amber); }
  .sev-card.low      .stat-value { color: #64748b; }
  .sev-card.info     .stat-value { color: #94a3b8; }

  .coverage-panel {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 18px 22px; margin-bottom: 24px;
  }
  .coverage-title {
    font-size: 13px; font-weight: 700; color: var(--text-main);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .cov-row {
    display: grid; grid-template-columns: 200px 1fr 72px; gap: 14px;
    align-items: center; padding: 7px 0;
  }
  .cov-label { font-size: 12.5px; color: var(--text-main); font-weight: 500; }
  .cov-bar-track {
    height: 10px; background: #f1f5f9; border-radius: 5px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .cov-bar-fill { height: 100%; border-radius: 5px; transition: width .4s; }
  .cov-bar-fill.good { background: linear-gradient(90deg, #4ade80, #16a34a); }
  .cov-bar-fill.ok   { background: linear-gradient(90deg, #fbbf24, #d97706); }
  .cov-bar-fill.bad  { background: linear-gradient(90deg, #f87171, #dc2626); }
  .cov-value { font-size: 12.5px; font-weight: 700; text-align: right; white-space: nowrap; }
  .cov-value.good { color: var(--green); }
  .cov-value.ok   { color: var(--amber); }
  .cov-value.bad  { color: var(--red); }

  .platform-panel {
    background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px;
    padding: 14px 18px; margin-bottom: 24px;
  }
  .platform-panel.clean { background: #f0fdf4; border-color: #bbf7d0; }
  .platform-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; }

  /* ── Container health cards ─────────────────────────────────────────── */
  .kc-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    margin-bottom: 14px; overflow: hidden;
  }
  .kc-card.sev-critical { border-left: 4px solid #7f1d1d; }
  .kc-card.sev-high     { border-left: 4px solid var(--red); }
  .kc-card.sev-med      { border-left: 4px solid var(--amber); }
  .kc-card.sev-low      { border-left: 4px solid #94a3b8; }
  .kc-card.sev-info,
  .kc-card.sev-clean    { border-left: 4px solid var(--green); }

  .kc-card-head {
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    padding: 12px 18px; cursor: pointer; user-select: none;
  }
  .kc-card-head:hover { background: #f8fafc; }
  .kc-card-title { font-size: 14px; font-weight: 700; color: var(--text-main); }
  .kc-card-meta  { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }

  .kc-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .kc-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em;
  }
  .kc-badge.meta      { background: #ede9fe; color: #5b21b6; }
  .kc-badge.noanchor  { background: #dbeafe; color: #1e40af; }
  .kc-badge.vocab     { background: #d1fae5; color: #065f46; }
  .kc-badge.inactive  { background: #f1f5f9; color: #64748b; }
  .kc-badge.count-crit { background: #7f1d1d; color: #fff; }
  .kc-badge.count-high { background: var(--red); color: #fff; }
  .kc-badge.count-med  { background: var(--amber); color: #fff; }
  .kc-badge.count-low  { background: #94a3b8; color: #fff; }

  .kc-card-body { padding: 0 18px 14px; border-top: 1px solid #f1f5f9; display: none; }
  .kc-card-body.open { display: block; }

  .chk-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid #f8fafc;
  }
  .chk-row:last-child { border-bottom: none; }
  .chk-sev {
    flex-shrink: 0; font-size: 10.5px; font-weight: 800; padding: 3px 7px;
    border-radius: 4px; letter-spacing: .03em; min-width: 64px; text-align: center;
  }
  .chk-sev.CRITICAL { background: #7f1d1d; color: #fff; }
  .chk-sev.HIGH     { background: #fee2e2; color: #991b1b; }
  .chk-sev.MED      { background: #fef3c7; color: #92400e; }
  .chk-sev.LOW      { background: #f1f5f9; color: #475569; }
  .chk-sev.INFO     { background: #f8fafc; color: #94a3b8; }
  .chk-msg { flex: 1; font-size: 12.5px; color: var(--text-main); line-height: 1.5; }
  .chk-id {
    font-size: 10.5px; color: var(--text-muted); font-family: ui-monospace, SFMono-Regular, monospace;
    margin-right: 6px;
  }
  .kc-clean {
    padding: 14px 0; text-align: center; font-size: 12.5px; color: var(--green);
    font-weight: 600;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .stat-row { grid-template-columns: repeat(2, 1fr); }
    .sev-row  { grid-template-columns: repeat(3, 1fr); }
    .detail-grid { grid-template-columns: repeat(2, 1fr); }
    .cov-row { grid-template-columns: 110px 1fr 52px; }
    .page-body { padding: 16px; }
  }

  /* Print / PDF */
  @media print {
    body { background: #fff; }
    .page-header { position: static; box-shadow: none; border-bottom: 2px solid #000; }
    .btn-refresh, .btn-download, .btn-back, .header-divider, .filter-bar, .actions-cell, .toast, .rec-actions { display: none !important; }
    .rec-panel { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
    .rec-header { background: #f8f8f0; }
    .rec-body.collapsed { display: flex !important; }
    .page-body { padding: 16px 0; max-width: 100%; }
    .gap-table th:last-child, .gap-table td:last-child { display: none; }
    .table-wrap { box-shadow: none; border: 1px solid #ccc; }
    .detail-row.open { display: table-row; }
    .stat-card { border: 1px solid #ccc; box-shadow: none; }
  }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header class="page-header">
  <a class="btn-back" id="btnBack" href="#">&larr; Knowledge Base</a>
  <div class="header-divider"></div>
  <div>
    <div class="header-title">KC Gaps & Health</div>
    <div class="header-sub">Runtime call failures + structural config audit</div>
  </div>
  <div class="header-spacer"></div>
  <button class="btn-download" onclick="downloadJSON()" title="Download as JSON">JSON</button>
  <button class="btn-download" onclick="downloadPDF()" title="Print / Save as PDF">PDF</button>
  <button class="btn-refresh" id="btnRefresh" onclick="refreshActiveTab()">Refresh</button>
</header>

<!-- ── Body ────────────────────────────────────────────────────────────────── -->
<div class="page-body">
  <!-- Tab strip (always visible once either tab has loaded) -->
  <div class="tab-strip" id="tabStrip">
    <button class="tab-btn active" data-tab="gaps"   onclick="switchTab('gaps')">
      <span>Runtime Gaps</span>
      <span class="tab-count" id="tabCountGaps">0</span>
    </button>
    <button class="tab-btn"        data-tab="health" onclick="switchTab('health')">
      <span>Config Health</span>
      <span class="tab-count" id="tabCountHealth">&middot;</span>
    </button>
  </div>

  <!-- Runtime Gaps panel (existing) -->
  <div class="tab-panel active" id="panelGaps">
    <div id="pageLoading" class="state-loading">Loading gap data...</div>
    <div id="pageContent" style="display:none;">
      <div id="statCards"></div>
      <div id="uapHealth"></div>
      <div id="recommendations"></div>
      <div id="filterBar"></div>
      <div id="gapTable"></div>
    </div>
  </div>

  <!-- Config Health panel (new) -->
  <div class="tab-panel" id="panelHealth">
    <div id="healthLoading" class="state-loading">Loading config health...</div>
    <div id="healthContent" style="display:none;">
      <div id="healthSeverityRow"></div>
      <div id="healthCoverage"></div>
      <div id="healthPlatform"></div>
      <div id="healthContainers"></div>
    </div>
  </div>
</div>

<!-- ── Toast ───────────────────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script src="/agent-console/todo.js"></script>
</body>
</html>
